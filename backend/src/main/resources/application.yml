server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: knowledge-backend
  security:
    # oauth2:
    #   resourceserver:
    #     jwt:
    #       # Uncomment and configure these for production JWT validation
    #       # issuer-uri: ${OAUTH2_JWT_ISSUER_URI}
    #       # jwk-set-uri: ${OAUTH2_JWT_JWK_SET_URI}
  config:
    import:
      - optional:file:deploy/.env[.properties]
      - optional:file:../deploy/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/knowledge}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:knowledge_app}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${BACKEND_MAX_FILE_SIZE:100MB}
      max-request-size: ${BACKEND_MAX_REQUEST_SIZE:100MB}
  data:
    redis:
      # Binds the built-in redis auto-configuration (used by the `redis` health group) to the
      # same REDIS_HOST/REDIS_PORT already wired by docker compose. Business caching is TODO.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:knowledge-backend-group}
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Health indicators are grouped so a failing optional dependency (e.g. OpenSearch/Milvus
    # not started locally) only marks its own group, never the overall /actuator/health.
    group:
      db:
        include: db
      redis:
        include: redis
      storage:
        include: storage
      ai-service:
        include: aiService
      search:
        include: search
      vector:
        include: vector

knowledge:
  security:
    enabled: ${KNOWLEDGE_SECURITY_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:KnowledgePlatformMVPSecretKey1234567890}
  storage:
    type: ${KNOWLEDGE_STORAGE_TYPE:local}
    local-root: ${KNOWLEDGE_STORAGE_LOCAL_ROOT:data/uploads}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:knowledge_minio}
      secret-key: ${MINIO_ROOT_PASSWORD:}
      bucket: ${MINIO_BUCKET:knowledge-documents}
  chunking:
    default-size: ${KNOWLEDGE_CHUNK_SIZE:800}
    default-overlap: ${KNOWLEDGE_CHUNK_OVERLAP:100}
    target-size: ${KNOWLEDGE_CHUNK_TARGET_SIZE:700}
    max-size: ${KNOWLEDGE_CHUNK_MAX_SIZE:${KNOWLEDGE_CHUNK_SIZE:1000}}
    min-size: ${KNOWLEDGE_CHUNK_MIN_SIZE:120}
    overlap: ${KNOWLEDGE_CHUNK_OVERLAP:80}
    sentence-boundary-enabled: ${KNOWLEDGE_CHUNK_SENTENCE_BOUNDARY_ENABLED:true}
    table-header-repeat-enabled: ${KNOWLEDGE_CHUNK_TABLE_HEADER_REPEAT_ENABLED:true}
    strategy-version: ${KNOWLEDGE_CHUNK_STRATEGY_VERSION:semantic-v1}
  desensitization:
    enabled: ${KNOWLEDGE_DESENSITIZATION_ENABLED:true}
    phone:
      enabled: ${KNOWLEDGE_DESENSITIZATION_PHONE_ENABLED:true}
    email:
      enabled: ${KNOWLEDGE_DESENSITIZATION_EMAIL_ENABLED:true}
    id-card:
      enabled: ${KNOWLEDGE_DESENSITIZATION_ID_CARD_ENABLED:true}
    amount:
      enabled: ${KNOWLEDGE_DESENSITIZATION_AMOUNT_ENABLED:true}
    customer-contact:
      enabled: ${KNOWLEDGE_DESENSITIZATION_CUSTOMER_CONTACT_ENABLED:true}
    customer-name:
      enabled: ${KNOWLEDGE_DESENSITIZATION_CUSTOMER_NAME_ENABLED:true}
    customer-name-replacement: ${KNOWLEDGE_DESENSITIZATION_CUSTOMER_NAME_REPLACEMENT:某金融客户}
    customer-names:
      - 平安银行
  metadata:
    database: ${KNOWLEDGE_META_DB:postgresql}
    postgresql-url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/knowledge}
    mysql-url: ${MYSQL_URL:jdbc:mysql://localhost:3306/knowledge}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  # Keyword search engine. database = JPA like search, opensearch = OpenSearch REST client.
  search:
    engine: ${SEARCH_ENGINE:database}
    endpoint: ${OPENSEARCH_ENDPOINT:http://localhost:9200}
    index-prefix: ${SEARCH_INDEX_PREFIX:knowledge}
    timeout: ${SEARCH_REQUEST_TIMEOUT:10s}
  # Vector store engine. mock = in-database mock vector search, milvus = Milvus REST client.
  vector-store:
    engine: ${VECTOR_STORE_ENGINE:mock}
    endpoint: ${MILVUS_ENDPOINT:http://localhost:19530}
    token: ${MILVUS_TOKEN:root:Milvus}
    collection-prefix: ${VECTOR_COLLECTION_PREFIX:knowledge}
    dimension: ${EMBEDDING_DIMENSION:16}
    timeout: ${VECTOR_STORE_REQUEST_TIMEOUT:10s}
    fail-fast: ${VECTOR_STORE_FAIL_FAST:false}
  embedding:
    provider: ${BACKEND_EMBEDDING_PROVIDER:${EMBEDDING_PROVIDER:mock}}
  kafka:
    enabled: ${KNOWLEDGE_KAFKA_ENABLED:true}
  ai-service:
    endpoint: ${AI_SERVICE_ENDPOINT:http://localhost:8001}
    parse-path: ${AI_SERVICE_PARSE_PATH:/api/v1/parse/document}
    embedding-path: ${AI_SERVICE_EMBEDDING_PATH:/api/v1/embeddings}
    embedding-provider: ${AI_SERVICE_EMBEDDING_PROVIDER:openai}
    embedding-model: ${AI_SERVICE_EMBEDDING_MODEL:mock-embedding-v1}
    embedding-dimension: ${EMBEDDING_DIMENSION:128}
    timeout: ${AI_SERVICE_TIMEOUT:60s}
  # LLM provider. mock | openai-compatible | qwen | private-http. Real providers are TODO.
  llm:
    provider: ${LLM_PROVIDER:mock}
    model-name: ${LLM_MODEL_NAME:mock-llm}
    api-key: ${LLM_API_KEY:}
    openai-compatible:
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.openai.com/v1}
      timeout: ${OPENAI_COMPATIBLE_TIMEOUT:60s}
    qwen:
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com}
      timeout: ${QWEN_TIMEOUT:60s}
    private-http:
      base-url: ${PRIVATE_HTTP_LLM_BASE_URL:http://localhost:8000}
      timeout: ${PRIVATE_HTTP_LLM_TIMEOUT:60s}
  tasks:
    parse:
      auto-run: ${PARSE_TASK_EXECUTOR_AUTO_RUN:false}
      fixed-delay: ${PARSE_TASK_EXECUTOR_FIXED_DELAY:10s}
      worker-id: ${PARSE_TASK_WORKER_ID:backend-local}
    embedding:
      auto-run: ${EMBEDDING_TASK_EXECUTOR_AUTO_RUN:false}
      fixed-delay: ${EMBEDDING_TASK_EXECUTOR_FIXED_DELAY:10s}
