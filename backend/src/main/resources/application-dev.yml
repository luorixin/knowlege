server:
  port: ${BACKEND_PORT:8080}

spring:
  config:
    import:
      - optional:file:deploy/.env[.properties]
      - optional:file:../deploy/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/knowledge}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:knowledge_app}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:change-me-local-postgres}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

knowledge:
  storage:
    type: ${KNOWLEDGE_STORAGE_TYPE:local}
    local-root: ${KNOWLEDGE_STORAGE_LOCAL_ROOT:data/uploads}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:knowledge_minio}
      secret-key: ${MINIO_ROOT_PASSWORD:change-me-local-minio}
      bucket: ${MINIO_BUCKET:knowledge-documents}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  metadata:
    database: ${KNOWLEDGE_META_DB:postgresql}
    postgresql-url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/knowledge}
    mysql-url: ${MYSQL_URL:jdbc:mysql://localhost:3306/knowledge}
  search:
    engine: ${SEARCH_ENGINE:mock}
    endpoint: ${OPENSEARCH_ENDPOINT:http://localhost:9200}
    index-prefix: ${SEARCH_INDEX_PREFIX:knowledge}
    timeout: ${SEARCH_REQUEST_TIMEOUT:10s}
  vector-store:
    engine: ${VECTOR_STORE_ENGINE:mock}
    endpoint: ${MILVUS_ENDPOINT:http://localhost:19530}
    token: ${MILVUS_TOKEN:root:Milvus}
    collection-prefix: ${VECTOR_COLLECTION_PREFIX:knowledge}
    dimension: ${EMBEDDING_DIMENSION:16}
    timeout: ${VECTOR_STORE_REQUEST_TIMEOUT:10s}
    fail-fast: ${VECTOR_STORE_FAIL_FAST:false}
  embedding:
    provider: ${BACKEND_EMBEDDING_PROVIDER:${EMBEDDING_PROVIDER:mock}}
  kafka:
    enabled: ${KNOWLEDGE_KAFKA_ENABLED:true}
  ai-service:
    endpoint: ${AI_SERVICE_ENDPOINT:http://localhost:8001}
    parse-path: ${AI_SERVICE_PARSE_PATH:/api/v1/parse/document}
    embedding-path: ${AI_SERVICE_EMBEDDING_PATH:/api/v1/embeddings}
    embedding-provider: ${AI_SERVICE_EMBEDDING_PROVIDER:openai}
    embedding-model: ${AI_SERVICE_EMBEDDING_MODEL:mock-embedding-v1}
    embedding-dimension: ${EMBEDDING_DIMENSION:128}
    timeout: ${AI_SERVICE_TIMEOUT:60s}
  tasks:
    parse:
      auto-run: ${PARSE_TASK_EXECUTOR_AUTO_RUN:false}
      fixed-delay: ${PARSE_TASK_EXECUTOR_FIXED_DELAY:10s}
      worker-id: ${PARSE_TASK_WORKER_ID:backend-local}
    embedding:
      auto-run: ${EMBEDDING_TASK_EXECUTOR_AUTO_RUN:false}
      fixed-delay: ${EMBEDDING_TASK_EXECUTOR_FIXED_DELAY:10s}

logging:
  level:
    com.sunxin.knowledge: INFO
