spring:
  datasource:
    url: jdbc:h2:mem:knowledge;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  autoconfigure:
    exclude:
      # Tests run without a Redis instance; exclude redis auto-configuration so the
      # `redis` health group is absent rather than reporting DOWN.
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  kafka:
    listener:
      auto-startup: false

knowledge:
  security:
    enabled: false
  storage:
    local-root: target/test-uploads
  embedding:
    provider: mock
  llm:
    provider: mock
  kafka:
    enabled: false
