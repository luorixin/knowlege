name: knowledge-platform

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: knowledge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: knowledge-mysql
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge}
      MYSQL_USER: ${MYSQL_USER:-knowledge_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-local-mysql}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local-mysql-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: knowledge-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: knowledge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-knowledge_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: knowledge-kafka
    user: root
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094,EXTERNAL://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kafka-data:/tmp/kafka-logs

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: knowledge-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      BACKEND_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-knowledge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-knowledge_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KNOWLEDGE_STORAGE_TYPE: local
      KNOWLEDGE_STORAGE_LOCAL_ROOT: /app/data/uploads
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-knowledge_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-documents}
      AI_SERVICE_ENDPOINT: http://ai-service:8001
      AI_SERVICE_PARSE_PATH: ${AI_SERVICE_PARSE_PATH:-/api/parse/document}
      AI_SERVICE_EMBEDDING_PATH: ${AI_SERVICE_EMBEDDING_PATH:-/api/v1/embeddings}
      AI_SERVICE_EMBEDDING_MODEL: ${AI_SERVICE_EMBEDDING_MODEL:-mock-embedding-v1}
      AI_SERVICE_TIMEOUT: ${AI_SERVICE_TIMEOUT:-60s}
      BACKEND_EMBEDDING_PROVIDER: ${BACKEND_EMBEDDING_PROVIDER:-ai-service}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-16}
      PARSE_TASK_EXECUTOR_AUTO_RUN: ${PARSE_TASK_EXECUTOR_AUTO_RUN:-false}
      PARSE_TASK_EXECUTOR_FIXED_DELAY: ${PARSE_TASK_EXECUTOR_FIXED_DELAY:-10s}
      PARSE_TASK_WORKER_ID: ${PARSE_TASK_WORKER_ID:-backend-local}
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      MILVUS_ENDPOINT: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-mock}
      VECTOR_STORE_ENGINE: ${VECTOR_STORE_ENGINE:-mock}
      SEARCH_REQUEST_TIMEOUT: ${SEARCH_REQUEST_TIMEOUT:-10s}
      VECTOR_STORE_REQUEST_TIMEOUT: ${VECTOR_STORE_REQUEST_TIMEOUT:-10s}
      VECTOR_STORE_FAIL_FAST: ${VECTOR_STORE_FAIL_FAST:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-uploads:/app/data/uploads

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
      args:
        INSTALL_OCR: ${AI_SERVICE_INSTALL_OCR:-false}
    container_name: knowledge-ai-service
    env_file:
      - .env
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8001
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"
    volumes:
      - backend-uploads:/app/data/uploads:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: knowledge-web
    environment:
      VITE_API_BASE_URL: ""
      VITE_DEV_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ../web/src:/app/src
      - ../web/index.html:/app/index.html
      - ../web/vite.config.ts:/app/vite.config.ts

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.19.3}
    container_name: knowledge-opensearch
    profiles: ["search"]
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-change-me-OpenSearch-Admin-123!}
      plugins.security.disabled: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_PERFORMANCE_PORT:-9600}:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.18}
    container_name: knowledge-etcd
    profiles: ["vector"]
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd

  milvus-minio:
    image: ${MILVUS_MINIO_IMAGE:-minio/minio:latest}
    container_name: knowledge-milvus-minio
    profiles: ["vector"]
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ACCESS_KEY:-milvus_minio}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_SECRET_KEY:-change-me-local-milvus-minio}
    volumes:
      - milvus-minio-data:/data

  milvus:
    image: ${MILVUS_IMAGE:-milvusdb/milvus:v2.6.6}
    container_name: knowledge-milvus
    profiles: ["vector"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY:-milvus_minio}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY:-change-me-local-milvus-minio}
    depends_on:
      - etcd
      - milvus-minio
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    volumes:
      - milvus-data:/var/lib/milvus

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  minio-data:
  backend-uploads:
  opensearch-data:
  etcd-data:
  milvus-minio-data:
  milvus-data:
  kafka-data:
